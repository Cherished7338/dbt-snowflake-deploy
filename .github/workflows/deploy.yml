name: Deploy dbt Project to Snowflake

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip -r dbt-snowflake-deploy.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "target/*" \
            -x "logs/*" \
            -x ".venv/*" \
            -x "__pycache__/*"

      - name: Install SnowSQL
        run: |
          curl -O https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.3/linux_x86_64/snowsql-1.3.2-linux_x86_64.bash
          bash snowsql-1.3.2-linux_x86_64.bash

      - name: Verify SnowSQL
        run: |
          snowsql --version

      - name: Upload ZIP to Snowflake Stage
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWSQL_PWD: ${{ secrets.SNOWFLAKE_PASSWORD }}

        run: |
          snowsql \
            -a $SNOWSQL_ACCOUNT \
            -u $SNOWSQL_USER \
            -r "${{ secrets.SNOWFLAKE_ROLE }}" \
            -w "${{ secrets.SNOWFLAKE_WAREHOUSE }}" \
            -d "${{ secrets.SNOWFLAKE_DATABASE }}" \
            -s "${{ secrets.SNOWFLAKE_SCHEMA }}" \
            -q "PUT file://dbt-snowflake-deploy.zip @CODE_STAGE AUTO_COMPRESS=FALSE OVERWRITE=TRUE;"