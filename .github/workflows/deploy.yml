name: Deploy dbt Project to Snowflake

on:
  workflow_dispatch:

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip -r Stage_POC.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "target/*" \
            -x "logs/*" \
            -x ".venv/*" \
            -x "__pycache__/*"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Snowflake Connector
        run: |
          python -m pip install --upgrade pip
          pip install snowflake-connector-python

      - name: Upload ZIP and Execute Stored Procedure
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}

        run: |
          python <<EOF
          import snowflake.connector

          conn = snowflake.connector.connect(
              account="${SNOWFLAKE_ACCOUNT}",
              user="${SNOWFLAKE_USER}",
              password="${SNOWFLAKE_PASSWORD}",
              warehouse="${SNOWFLAKE_WAREHOUSE}",
              database="${SNOWFLAKE_DATABASE}",
              schema="${SNOWFLAKE_SCHEMA}",
              role="${SNOWFLAKE_ROLE}",
          )

          cur = conn.cursor()

          print("Uploading ZIP to Snowflake Stage...")

          cur.execute("""
          PUT file://Stage_POC.zip
          @CODE_STAGE
          AUTO_COMPRESS=FALSE
          OVERWRITE=TRUE
          """)

          print("ZIP uploaded successfully.")

          print("Executing Stored Procedure...")

          cur.execute("CALL TEST_DBT_RUNNER();")

          for row in cur:
              print(row)

          cur.close()
          conn.close()

          print("Deployment completed successfully.")
          EOF